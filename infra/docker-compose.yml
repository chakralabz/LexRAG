services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"

  redis:
    image: redis:latest
    ports:
      - "6379:6379"

  langfuse:
    image: langfuse/langfuse:2
    ports:
      - "3001:3000"
