minimum_pre_commit_version: "4.0.0"
default_stages: [pre-commit]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run --extra dev python -m mypy ingestion/ retrieval/ generation/ serving/
        language: system
        pass_filenames: false

      - id: pytest-unit
        name: pytest (unit)
        entry: uv run --extra dev pytest tests/unit -q
        language: system
        pass_filenames: false
